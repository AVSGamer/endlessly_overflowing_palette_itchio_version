name: Build Godot Web & Deploy to Itch.io

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      # 1. Inject hidden AdSense IDs into your custom HTML shell before exporting
      # Note: Points directly into your subfolder directory layout to apply the keys!
      - name: Inject AdSense Credentials
        run: |
          sed -i "s/vsgamer57pid/${{ vars.ADSENSE_PUB_ID }}/g" ./endlessly-overflowing-palette-v-2-by-papi-res/web_shell.html
          sed -i "s/vsgamer57sid/${{ vars.ADSENSE_SLOT_ID }}/g" ./endlessly-overflowing-palette-v-2-by-papi-res/web_shell.html

      # 2. Compile Godot 4.6 using direct non-redirected file assets mirrors
      - name: Godot Web Export
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          # THESE SPECIFIC MULTI-LINE LINKS ARE ABSOLUTELY ESSENTIAL! DO NOT TRUNCATE THEM!
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.0/Godot_v4.0-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.0/Godot_v4.0-stable_export_templates.tpz
          relative_project_path: ./endlessly-overflowing-palette-v-2-by-papi-res/
          presets_to_export: Web
          archive_output: true

      # 3. Download and Install Itch.io's Official Butler Utility directly from the verified .ZONE mirror
      - name: Setup Official Butler Tool
        run: |
          curl -L -o butler.zip https://itch.zone
          unzip butler.zip -d bin
          chmod +x bin/butler
          echo "$(pwd)/bin" >> $GITHUB_PATH

      # 4. Fire the deployment using official native push rules (Ensure user and slug are LOWERCASE)
      - name: Push to Itch.io via Official Butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          butler push ./endlessly-overflowing-palette-v-2-by-papi-res/exports/Web/ vsgamer57/endlessly-overflowing-palette-by-papire:html5
