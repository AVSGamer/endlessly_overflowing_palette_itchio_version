name: Build Godot Web & Deploy to Itch.io

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Inject hidden AdSense IDs into your custom HTML shell before exporting
      - name: Inject AdSense Credentials
        run: |
          sed -i "s/vsgamer57pid/${{ vars.ADSENSE_PUB_ID }}/g" path/to/your/web_shell.html
          sed -i "s/vsgamer57sid/${{ vars.ADSENSE_SLOT_ID }}/g" path/to/your/web_shell.html

      # 2. Automatically compile the Godot 4 game to Web/HTML5
      - name: Godot Web Export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com
          godot_export_templates_download_url: https://github.com
          relative_project_path: ./endlessly-overflowing-palette-v-2-by-papi-res/
          export_preset_name: Web

      # 3. Push the compiled game files to Itch.io using the working YesLayla Action
      - name: Deploy to Itch.io via Butler
        uses: yeslayla/butler-publish-itchio-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html5
          ITCH_GAME: endlessly-overflowing-palette-by-papire
          ITCH_USER: VSGamer57
          PACKAGE: exports/Web/
