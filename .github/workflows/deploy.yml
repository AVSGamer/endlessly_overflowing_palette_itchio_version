name: Build Godot Web & Deploy to Itch.io

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Inject AdSense Credentials
        run: |
          sed -i "s/vsgamer57pid/${{ vars.ADSENSE_PUB_ID }}/g" ./endlessly-overflowing-palette-v-2-by-papi-res/web_shell.html
          sed -i "s/vsgamer57sid/${{ vars.ADSENSE_SLOT_ID }}/g" ./endlessly-overflowing-palette-v-2-by-papi-res/web_shell.html

      - name: Godot Web Export
        uses: firebelley/godot-export@v7.0.0
        with:
          # DIRECT ASSET SERVERS: Bypasses security redirect blocks entirely
          godot_executable_download_url: https://github.com
          godot_export_templates_download_url: https://github.com
          relative_project_path: ./endlessly-overflowing-palette-v-2-by-papi-res/
          presets_to_export: Web

      - name: Setup Official Butler Tool
        run: |
          curl -L -o butler.zip https://itch.zone
          unzip butler.zip -d bin
          chmod +x bin/butler
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Push to Itch.io via Official Butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          butler push endlessly-overflowing-palette-v-2-by-papi-res/exports/Web/ vsgamer57/endlessly-overflowing-palette-by-papire:html5
