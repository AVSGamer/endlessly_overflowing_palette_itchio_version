<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Endlessly Overflowing Palette</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            font-family: sans-serif;
        }

        #game-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
        }

        #ad-wrapper {
            width: 100%;
            height: 100px;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent placeholder match */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
    </style>
    
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="ad-wrapper">
        <ins class="adsbygoogle"
             style="display:inline-block;width:728px;height:100px"
             data-ad-client="vsgamer57pid"
             data-ad-slot="vsgamer57sid"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script src="$GODOT_PROJECT_NAME.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            if (typeof Engine !== 'undefined') {
                const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"$GODOT_URL","fscache":true,"gdextensionTextures":true};
                const engine = new Engine(GODOT_CONFIG);
                engine.startGame();
            } else {
                console.error("Critical Error: Godot Engine script was not loaded by the server!");
            }
        });
    </script>
</body>
</html>
